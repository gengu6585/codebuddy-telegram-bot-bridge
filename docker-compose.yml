services:
  codebuddy-telegram-bot:
    build:
      context: .
      dockerfile: Dockerfile
    image: codebuddy-telegram-bot:latest
    container_name: codebuddy-telegram-bot
    restart: unless-stopped
    network_mode: host
    environment:
      HOME: /root
      PROJECT_ROOT: /workspace/tinkerlab
      NODE_TLS_REJECT_UNAUTHORIZED: "0"
    volumes:
      - bot-data:/workspace/tinkerlab/.telegram_bot
      - codebuddy-data:/root/.codebuddy
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  bot-data:
  codebuddy-data:
